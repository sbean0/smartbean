<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartbean AI - Shop</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: #0f0;
            margin: 0;
            padding: 20px;
            line-height: 1.5;
        }
        .container {
            max-width: 700px;
            margin: 40px auto;
            background: #111;
            border: 1px solid #0f0;
            padding: 40px 30px;
            border-radius: 8px;
            text-align: center;
        }
        h1 {
            color: #0f0;
            margin-bottom: 20px;
        }
        .message {
            font-size: 1.15rem;
            margin: 25px 0;
            color: #4ade80;
        }
        .shop-link {
            display: inline-block;
            margin: 30px 0;
            padding: 16px 40px;
            background: #0f0;
            color: #000;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            font-size: 1.25em;
            transition: all 0.2s;
        }
        .shop-link:hover {
            background: #4ade80;
            transform: scale(1.05);
        }
        .back {
            margin-top: 50px;
        }
        .support-text {
            color: #aaa;
            font-size: 0.95rem;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌱 Smartbean Shop</h1>
        
        <p class="message">Thank you for supporting our mission to advance humanity's potential!</p>
        
        <a href="https://shop.smartbean.ai" target="_blank" class="shop-link">
            → Visit the Shop ←
        </a>
        
        <p class="support-text">
            Every purchase directly helps fund innovative AI projects.
        </p>

        <div class="back">
            <a href="index.html" style="color:#0f0; text-decoration:none; font-size:1.1em;">
                ← Back to Terminal
            </a>
        </div>
    </div>
</body>
</html>
