<!DOCTYPE html>
<html lang="en">
<head>
<script src="wanakana.min.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Smartbean Ai</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 64 64%22><rect width=%2264%22 height=%2264%22 fill=%22%230d0d0d%22/><circle cx=%2220%22 cy=%2232%22 r=%226%22 fill=%22%2300ff41%22/><circle cx=%2220%22 cy=%2252%22 r=%226%22 fill=%22%2300ff41%22/><circle cx=%2244%22 cy=%2212%22 r=%226%22 fill=%22%2300ff41%22/></svg>">
<style>
    body {
        font-family: 'Courier New', Courier, monospace;
        background-color: #000;
        color: #0f0;
        margin: 0;
        padding: 0;
        display: flex;
        flex-direction: column;
        height: 100dvh;
        overflow: hidden;
    }
    .terminal {
        flex: 1;
        padding: 20px;
        overflow-y: auto;
        white-space: pre-wrap;
        word-wrap: break-word;
        -webkit-overflow-scrolling: touch;
        font-size: 1rem;          /* more controlled */
    line-height: 1.45;
        
    }
    .header {
        text-align: center;
        padding: 10px;
        background-color: #111;
        border-bottom: 1px solid #0f0;
    }
    .prompt {
        display: flex;
        align-items: center;
        padding: 15px;
        background-color: #111;
        border-top: 1px solid #0f0;
        cursor: text;
        gap: 6px;
        width: 100%;
        box-sizing: border-box;
    }
    .prompt-text {
        color: #0f0;
        font-weight: bold;
        flex-shrink: 0;
        user-select: none;
        white-space: pre;
    }
    .input {
        flex: 1;
        background: none;
        border: none;
        color: #0f0;
        font-family: inherit;
        outline: none;
        font-size: 16px;
        caret-color: #0f0;           /* real cursor is now green */
        min-width: 0;
        padding: 0;
        margin: 0;
    }

/* Improved mobile */
@media (max-width: 600px) {
    .terminal {
        padding: 12px;
        font-size: 0.95rem;
    }
    .prompt {
        padding: 12px 10px;
    }
    .header {
        padding: 8px;
    }
}

/* Fix blank space when keyboard opens */
@media (max-height: 600px) {
    .terminal {
        max-height: 55vh;     /* prevents huge blank area */
    }
}
</style>
    

</head>
<body>
    <div class="header">
        <h1>Smartbean Ai</h1>
        <p>Advancing Humanity's Potential</p>
    </div>
    <div class="terminal" id="terminal">
        <p>Welcome to Smartbean Ai.</p>
        <p>Our mission is to advance humanity's potential through innovative AI solutions.</p>
        <p>Type "help" for available commands.</p>
    </div>
  <form class="prompt" onsubmit="handleEnter(event)">
    <span class="prompt-text">&gt; </span>
    <input type="text" class="input" id="input" autofocus autocomplete="off" spellcheck="false">
</form>

<script>
    const terminal = document.getElementById('terminal');
    const input = document.getElementById('input');

    let history = [];
    let historyIndex = -1;

    const brailleMap = {
        'a': 'таБ', 'b': 'таГ', 'c': 'таЙ', 'd': 'таЩ', 'e': 'таС', 'f': 'таЛ', 'g': 'таЫ', 'h': 'таУ',
        'i': 'таК', 'j': 'таЪ', 'k': 'таЕ', 'l': 'таЗ', 'm': 'таН', 'n': 'таЭ', 'o': 'таХ', 'p': 'таП',
        'q': 'таЯ', 'r': 'таЧ', 's': 'таО', 't': 'таЮ', 'u': 'тае', 'v': 'таз', 'w': 'та║', 'x': 'тан',
        'y': 'та╜', 'z': 'та╡', '0': 'та╝таЪ', '1': 'та╝таБ', '2': 'та╝таГ', '3': 'та╝таЙ', '4': 'та╝таЩ',
        '5': 'та╝таС', '6': 'та╝таЛ', '7': 'та╝таЫ', '8': 'та╝таУ', '9': 'та╝таК', ' ': ' '
    };

    function toBraille(text) {
        return text.toLowerCase().split('').map(c => brailleMap[c] || c).join('');
    }

function toJapanese(text) {
    if (text.toLowerCase().includes("good morning")) {
        return `ЁЯЗпЁЯЗ╡ уВ░уГГуГЙуГвуГ╝уГЛуГ│уВ░я╝Б`;
    }
    // fallback for other text
    let kana = wanakana.toKatakana(text);
    return `ЁЯЗпЁЯЗ╡ ${kana}я╝Б`;
}

    function handleEnter(event) {
        event.preventDefault();
        const command = input.value.trim();
        if (command) {
            history.unshift(command);
            if (history.length > 5) history.pop();

            terminal.innerHTML += `<div>> ${command}</div>`;
            processCommand(command);
            input.value = '';
            historyIndex = -1;
        }
        terminal.scrollTop = terminal.scrollHeight;
        input.focus();
    }

    function processCommand(command) {
        let response = '';
        const parts = command.split(' ');
        const cmd = parts[0].toLowerCase();

        switch (cmd) {
            case 'help':
                response = `Available commands:
  help          - Show this help
  about         - About Smartbean AI
  projects      - Our projects
  contact       - Contact info
  echo [text]   - Repeat text
  echo -b|--braille [text] - Convert to Braille
  echo -j|--japanese [text]- Convert to Katakana
  feedback      - Open feedback form
  shop          - Support our mission
  clear         - Clear terminal`;
                break;

            case 'about':
                response = 'Smartbean Ai is dedicated to advancing human potential through AI.';
                break;

            case 'projects':
                response = 'Projects: Smartly Academy, WellCity, and more.';
                break;

            case 'contact':
                response = 'Email: info[@]smartbean.ai';
                break;

            case 'feedback':
                response = 'тЬЕ Opening feedback form...';
                setTimeout(() => {
                    window.location.href = 'feedback.html';
                }, 300);
                break;

            case 'echo':
                const flags = parts[1] ? parts[1].toLowerCase() : '';
                let text = parts.slice(2).join(' ');
                if (!text && (flags === '-b' || flags === '--braille' || flags === '-j' || flags === '--japanese')) {
                    text = parts.slice(1).join(' ');
                }
                if (flags === '-b' || flags === '--braille') {
                    response = toBraille(text);
                } else if (flags === '-j' || flags === '--japanese') {
                    response = toJapanese(text);
                } else {
                    response = parts.slice(1).join(' ');
                }
                break;

            case 'clear':
                terminal.innerHTML = `<p>Welcome to Smartbean Ai.</p>
<p>Our mission is to advance humanity's potential through innovative AI solutions.</p>
<p>Type "help" for available commands.</p>`;
                return;

            // ==================== SHOP COMMAND ====================
            case 'shop':
                response = 'ЁЯМ▒ Thank you for supporting our mission!<br>Opening Smartbean Shop...';
                setTimeout(() => {
                    window.location.href = 'shop.html';
                }, 400);
                break;

            default:
                response = `Command not recognized: ${cmd}. Type "help" for available commands.`;
        }

        terminal.innerHTML += `<div>${response}</div>`;
        terminal.scrollTop = terminal.scrollHeight;
    }
    input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            handleEnter(e);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            if (history.length === 0) return;
            if (historyIndex < history.length - 1) historyIndex++;
            input.value = history[historyIndex];
        } else if (e.key === 'ArrowDown') {
            e.preventDefault();
            if (historyIndex > 0) {
                historyIndex--;
                input.value = history[historyIndex];
            } else {
                historyIndex = -1;
                input.value = '';
            }
        }
    });

    document.addEventListener('click', () => input.focus());
</script>

</body>
</html>
